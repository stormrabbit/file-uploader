<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'" />
  <title>File Uploader — Error</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #333;
    }

    .card {
      width: 560px;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 32px 36px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }

    .icon {
      font-size: 36px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #c0392b;
      margin-bottom: 10px;
    }

    .detail {
      font-size: 14px;
      color: #555;
      background: #f5f5f5;
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 18px;
      word-break: break-all;
      white-space: pre-wrap;
    }

    .log-section {
      font-size: 13px;
      color: #777;
      margin-bottom: 24px;
    }

    .log-path {
      display: block;
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 12px;
      color: #444;
      background: #f0f0f0;
      border-radius: 3px;
      padding: 6px 10px;
      margin-top: 6px;
      word-break: break-all;
    }

    button {
      padding: 8px 20px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover { background: #555; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚠️</div>
    <h1>{{TITLE}}</h1>
    <div class="detail">{{DETAIL}}</div>
    <div class="log-section">
      Server log:
      <span class="log-path">{{LOG_PATH}}</span>
    </div>
    <button onclick="window.close()">Quit</button>
  </div>
</body>
</html>
